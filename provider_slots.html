<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Slots — AppointEase Provider</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .provider-layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - var(--nav-h)); margin-top:var(--nav-h); }
    .provider-sidebar { background:var(--secondary); border-right:1px solid var(--card-border); padding:2rem 1.2rem; position:sticky; top:var(--nav-h); height:calc(100vh - var(--nav-h)); overflow-y:auto; }
    .sidebar-nav a { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; color:var(--text-muted); font-size:0.88rem; font-weight:500; text-decoration:none; transition:all var(--transition); margin-bottom:2px; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background:rgba(124,58,237,0.1); color:var(--accent); font-weight:700; }
    .provider-main { padding:2.5rem; overflow-y:auto; }
    .slots-grid { display:grid; grid-template-columns:1fr 1fr; gap:2rem; }
    .panel { background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius); padding:1.5rem; }
    .panel h3 { font-size:1rem; font-weight:700; margin-bottom:1.2rem; display:flex;align-items:center;gap:8px; }
    .time-checkboxes { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:1.2rem; }
    .time-check { display:flex; align-items:center; gap:6px; font-size:0.82rem; cursor:pointer; }
    .time-check input { accent-color:var(--accent); width:15px; height:15px; cursor:pointer; }
    .existing-slot { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; background:var(--input-bg); border-radius:var(--radius-sm); margin-bottom:6px; font-size:0.85rem; }
    .existing-slot.booked { opacity:0.5; }
    .del-btn { background:none; border:none; color:var(--danger); cursor:pointer; font-size:1rem; padding:2px 4px; border-radius:4px; transition:background var(--transition); }
    .del-btn:hover { background:rgba(225,29,72,0.1); }
    @media(max-width:800px){.provider-layout{grid-template-columns:1fr;}.provider-sidebar{display:none;}.slots-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand"><div class="brand-icon">📅</div>Appoint<span>Ease</span></a>
    <ul class="nav-links">
      <li><a href="provider_dashboard.html">Dashboard</a></li>
      <li><a href="provider_appointments.html">Appointments</a></li>
      <li><a href="provider_slots.html" class="active">Slots</a></li>
      <li><a href="provider_profile.html">Profile</a></li>
    </ul>
    <div class="nav-actions"></div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <div class="provider-layout">
    <aside class="provider-sidebar">
      <nav class="sidebar-nav">
        <a href="provider_dashboard.html">📊 Dashboard</a>
        <a href="provider_appointments.html">📅 Appointments</a>
        <a href="provider_slots.html" class="active">⏰ Manage Slots</a>
        <a href="provider_profile.html">✏️ Edit Profile</a>
        <a href="#" onclick="logout(); return false;" style="margin-top:1rem;color:var(--danger)">🚪 Sign Out</a>
      </nav>
    </aside>

    <main class="provider-main">
      <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:0.3rem">⏰ Manage Time Slots</h1>
      <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem">Add your availability so patients can book appointments with you.</p>

      <div class="slots-grid">
        <!-- Add Slots Panel -->
        <div class="panel">
          <h3>➕ Add Availability</h3>
          <div class="form-group">
            <label>Select Date</label>
            <input type="date" id="slotDate" class="form-control" />
          </div>
          <div class="form-group">
            <label>Select Time Slots</label>
            <div class="time-checkboxes" id="timeCheckboxes"></div>
          </div>
          <button class="btn btn-primary btn-block" id="addSlotsBtn" onclick="addSlots()">Add Selected Slots</button>
        </div>

        <!-- View Existing Slots Panel -->
        <div class="panel">
          <h3>📋 Existing Slots</h3>
          <div class="form-group">
            <label>Filter by Date</label>
            <input type="date" id="viewDate" class="form-control" />
          </div>
          <div id="existingSlots"><p style="color:var(--text-muted);font-size:0.85rem">Select a date to view slots.</p></div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (!isLoggedIn() || (!isProvider() && !isAdmin())) window.location.href = 'login.html';

    let myProviderId = getProviderId();
    const times = ['08:00 AM','08:30 AM','09:00 AM','09:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','01:00 PM','01:30 PM','02:00 PM','02:30 PM','03:00 PM','03:30 PM','04:00 PM','04:30 PM','05:00 PM','05:30 PM','06:00 PM','06:30 PM'];

    // Build time checkboxes
    const dateInput = document.getElementById('slotDate');
    const today = new Date().toISOString().split('T')[0];
    dateInput.min = today;
    dateInput.value = today;

    const checkboxContainer = document.getElementById('timeCheckboxes');
    times.forEach(t => {
      const label = document.createElement('label');
      label.className = 'time-check';
      label.innerHTML = `<input type="checkbox" value="${t}" /> ${t}`;
      checkboxContainer.appendChild(label);
    });

    // Load provider ID if not in localStorage
    async function ensureProviderId() {
      if (myProviderId) return myProviderId;
      try {
        const p = await api.get('/providers/me');
        myProviderId = p._id;
        localStorage.setItem('ae_provider_id', myProviderId);
        return myProviderId;
      } catch(e) { return null; }
    }

    async function addSlots() {
      const date = document.getElementById('slotDate').value;
      if (!date) { showToast('Please select a date.', 'error'); return; }
      const selected = [...document.querySelectorAll('#timeCheckboxes input:checked')].map(c => c.value);
      if (!selected.length) { showToast('Please select at least one time slot.', 'error'); return; }
      const providerId = await ensureProviderId();
      if (!providerId) { showToast('Could not find your provider profile.', 'error'); return; }
      const btn = document.getElementById('addSlotsBtn');
      btn.innerHTML = '⏳ Adding...'; btn.disabled = true;
      try {
        await api.post('/slots', { provider: providerId, date, times: selected });
        showToast(`✅ ${selected.length} slot(s) added!`, 'success');
        document.querySelectorAll('#timeCheckboxes input').forEach(c => c.checked = false);
        // Refresh view if same date
        if (document.getElementById('viewDate').value === date) loadExistingSlots();
      } catch(e) {
        showToast(e.message || 'Failed to add slots.', 'error');
      } finally {
        btn.innerHTML = 'Add Selected Slots'; btn.disabled = false;
      }
    }

    async function loadExistingSlots() {
      const date = document.getElementById('viewDate').value;
      if (!date) return;
      const providerId = await ensureProviderId();
      if (!providerId) return;
      const el = document.getElementById('existingSlots');
      el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">Loading...</p>';
      try {
        const slots = await api.get(`/slots?provider_id=${providerId}&date=${date}`);
        if (!slots.length) { el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">No slots for this date.</p>'; return; }
        el.innerHTML = slots.map(s => `
          <div class="existing-slot ${s.isBooked ? 'booked' : ''}">
            <span>${s.time} ${s.isBooked ? '<span class="badge badge-danger" style="margin-left:6px">Booked</span>' : ''}</span>
            ${!s.isBooked ? `<button class="del-btn" onclick="deleteSlot('${s._id}')">🗑️</button>` : ''}
          </div>`).join('');
      } catch(e) { el.innerHTML = '<p style="color:var(--danger);font-size:0.85rem">Failed to load slots.</p>'; }
    }

    async function deleteSlot(id) {
      if (!confirm('Delete this slot?')) return;
      try {
        await api.delete(`/slots/${id}`);
        showToast('Slot deleted.', 'success');
        loadExistingSlots();
      } catch(e) { showToast(e.message || 'Could not delete.', 'error'); }
    }

    document.getElementById('viewDate').addEventListener('change', loadExistingSlots);
    document.getElementById('viewDate').value = today;
    loadExistingSlots();
  </script>
</body>
</html>
